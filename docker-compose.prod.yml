# =============================================================================
# LankaCommerce Cloud - Production Docker Compose Overrides
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend - Gunicorn Production Server
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 2
      --timeout 120
      --access-logfile -
      --error-logfile -
    volumes: []
    ports: []
    environment:
      - DEBUG=False
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  # ---------------------------------------------------------------------------
  # Database - PostgreSQL (Production Overrides)
  # ---------------------------------------------------------------------------
  db:
    ports: []
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ---------------------------------------------------------------------------
  # Redis - Cache & Message Broker (Production Overrides)
  # ---------------------------------------------------------------------------
  redis:
    ports: []
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: always

  # ---------------------------------------------------------------------------
  # Celery Worker - Production
  # ---------------------------------------------------------------------------
  celery:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: >
      celery -A config worker
      -l warning
      --concurrency=4
    volumes: []
    environment:
      - DEBUG=False
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings.production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: always

  # ---------------------------------------------------------------------------
  # Celery Beat - Production
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    command: >
      celery -A config beat
      -l warning
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes: []
    environment:
      - DEBUG=False
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=config.settings.production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: always

  # ---------------------------------------------------------------------------
  # Frontend - Next.js Production Build
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    command: node server.js
    working_dir: /app
    volumes: []
    ports: []
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: always

  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy & Static Files
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: lcc_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - nginx_certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - lcc_network
    restart: always

# =============================================================================
# Volumes (Production)
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  nginx_certs:
    driver: local
