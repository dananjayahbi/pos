# ==================================================
# LankaCommerce Cloud - Docker Compose Configuration
# ==================================================
# Purpose: Development environment orchestration
# Usage: docker compose up -d
# ==================================================

services:
  # -------------------------------------------------
  # Backend - Django REST API
  # -------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.dev
    container_name: lcc-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-static:/app/staticfiles
      - backend-media:/app/mediafiles
    environment:
      - DEBUG=true
      - DJANGO_SETTINGS_MODULE=config.settings.local
    env_file:
      - .env
    networks:
      - lcc-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # -------------------------------------------------
  # Frontend - Next.js Application
  # -------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.dev
    container_name: lcc-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - WATCHPACK_POLLING=true
    env_file:
      - .env
    networks:
      - lcc-network
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # -------------------------------------------------
  # Database - PostgreSQL
  # -------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: lcc-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    environment:
      - POSTGRES_DB=lankacommerce
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dev_password}
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - lcc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lankacommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # -------------------------------------------------
  # Redis - Cache & Message Broker
  # -------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lcc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - lcc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # -------------------------------------------------
  # Celery Worker - Background Task Processing
  # -------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.dev
    container_name: lcc-celery-worker
    volumes:
      - ./backend:/app
      - ./docker/scripts:/scripts:ro
    command: /scripts/celery-worker.sh
    environment:
      - CELERY_APP=config.celery:app
      - CELERY_CONCURRENCY=2
      - CELERY_QUEUES=default,high_priority,low_priority
      - CELERY_LOG_LEVEL=info
    env_file:
      - .env
    networks:
      - lcc-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "celery",
          "-A",
          "config.celery",
          "inspect",
          "ping",
          "--timeout",
          "5",
        ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # -------------------------------------------------
  # Celery Beat - Task Scheduler
  # -------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.dev
    container_name: lcc-celery-beat
    volumes:
      - ./backend:/app
      - ./docker/scripts:/scripts:ro
    command: /scripts/celery-beat.sh
    environment:
      - CELERY_APP=config.celery:app
      - CELERY_BEAT_SCHEDULER=django_celery_beat.schedulers:DatabaseScheduler
      - CELERY_LOG_LEVEL=info
    env_file:
      - .env
    networks:
      - lcc-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------
  # Flower - Celery Monitoring
  # -------------------------------------------------
  flower:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.dev
    container_name: lcc-flower
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
      - ./docker/scripts:/scripts:ro
    command: /scripts/flower.sh
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
      - FLOWER_BASIC_AUTH=admin:admin
    env_file:
      - .env
    networks:
      - lcc-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

# -------------------------------------------------
# Networks
# -------------------------------------------------
networks:
  lcc-network:
    driver: bridge
    name: lankacommerce-network

# -------------------------------------------------
# Volumes
# -------------------------------------------------
volumes:
  postgres-data:
    name: lcc-postgres-data
    driver: local
  redis-data:
    name: lcc-redis-data
    driver: local
  backend-static:
    name: lcc-backend-static
    driver: local
  backend-media:
    name: lcc-backend-media
    driver: local
