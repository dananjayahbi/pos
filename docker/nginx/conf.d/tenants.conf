# Wildcard subdomain handler for development
# Handles: tenant1.localhost, tenant2.localhost, platform.localhost, etc.
#
# NOTE: Windows hosts file does not support wildcard entries.
# Add individual tenant entries to C:\Windows\System32\drivers\etc\hosts:
#   127.0.0.1  tenant1.localhost
#   127.0.0.1  tenant2.localhost
#   127.0.0.1  platform.localhost
#   127.0.0.1  demo.localhost
#
# Alternative: Use nip.io (no hosts file edits needed):
#   tenant1.127.0.0.1.nip.io → resolves to 127.0.0.1

server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.localhost$;

    # Proxy frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Next.js HMR in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy media files
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
